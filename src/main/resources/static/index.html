<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/all.min.css">
    <title>Job Organizer</title>
</head>
<body>
<div class="icon-text">
    <i class="fa-solid fa-briefcase fa-2x"></i>
    <h1>Job Organizer</h1>
</div>

<form id="jobForm" class="job-form">

    <div class="form-group">
        <label>Job Title *</label>
        <input type="text" id="jobTitle" required>
    </div>

    <div class="form-group">
        <label>Location</label>
        <input type="text" id="location">
    </div>

    <div class="form-group">
        <label>Company</label>
        <input type="text" id="company">
    </div>

    <div class="form-group">
        <label>Job Salary</label>
        <input type="number" id="salary">
    </div>

    <div class="form-group">
        <label>Desired Salary</label>
        <input type="number" id="desiredSalary">
    </div>

    <div class="form-group">
        <label>Status:
            <select id="status">
                <option value="PENDING">Pending</option>
                <option value="ACCEPTED">Accepted</option>
                <option value="REJECTED">Rejected</option>
            </select>
        </label>
    </div>

    <div class="form-button">
        <button type="submit">Save Job</button>
    </div>

</form>



<!--<button id="submitBtn">Submit Job</button>-->
<div class="result" id="result"></div>

<table id="allJobs" class="result">
    <thead>
    <tr>
        <th><i class="fa-solid fa-circle-user"></i>Title</th>
        <th><i class="fa-solid fa-users"></i>Company</th>
        <th><i class="fa-solid fa-city"></i>Location</th>
        <th><i class="fa-solid fa-money-bill"></i>Salary</th>
        <th><i class="fa-solid fa-dollar-sign"></i>Desired</th>
        <th><i class="fa-solid fa-sliders"></i>Salary Score</th>
        <th><i class="fa-solid fa-gears"></i>Status</th>
        <th><i class="fa-solid fa-circle-xmark"></i>Delete</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
